<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>가계부</title>
<style>
  :root {
    --pk50: #FDF0F5; --pk100: #F9D6E7; --pk200: #F2AACF; --pk400: #E07AAF; --pk600: #C04E8A;
    --red-soft: #F4A8A8; --red-text: #C97070; --red-bg: #FDEAEA;
    --green-soft: #A8D5B5; --green-text: #5A9A72; --green-bg: #EDF7F0; --green-border: #A8D5B5;
    --warn-bg: #FEF3E2; --warn-border: #F0D09A; --warn-text: #A07840;
    --txt-main: #444; --txt-sub: #888; --txt-hint: #bbb;
    --border: #F0E8EC; --bg-input: #FDF0F5;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif; background: #f7f0f4; min-height: 100vh; display: flex; justify-content: center; padding: 24px 12px; }
  .app { width: 100%; max-width: 440px; }

  /* Header */
  .app-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; padding: 0 4px; }
  .app-title { font-size: 18px; font-weight: 600; color: var(--txt-main); }
  .month-nav { display: flex; align-items: center; gap: 10px; }
  .month-nav span { font-size: 14px; color: var(--txt-sub); font-weight: 500; }
  .month-btn { font-size: 16px; color: var(--pk400); background: none; border: none; cursor: pointer; padding: 0 4px; line-height: 1; }

  /* Tab */
  .tab-bar { display: flex; gap: 4px; background: #ede0e8; border-radius: 14px; padding: 4px; margin-bottom: 14px; }
  .tab { flex: 1; text-align: center; font-size: 11px; padding: 7px 4px; border-radius: 10px; color: #aaa; cursor: pointer; border: none; background: transparent; transition: all 0.15s; font-family: inherit; }
  .tab.active { background: #fff; color: var(--txt-main); font-weight: 500; box-shadow: 0 1px 4px rgba(200,120,160,0.12); }

  /* Screen */
  .screen { display: none; }
  .screen.active { display: block; }

  /* Card */
  .card { background: #fff; border: 0.5px solid var(--border); border-radius: 16px; padding: 14px 16px; margin-bottom: 12px; }
  .card-hd { font-size: 11px; color: var(--txt-hint); font-weight: 500; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
  .add-span { font-size: 11px; color: #ccc; cursor: pointer; }
  .add-span:hover { color: var(--pk400); }

  /* Section divider */
  .sec-div { font-size: 10px; color: #ccc; background: var(--pk50); padding: 3px 8px; border-radius: 4px; margin: 8px 0 4px; }

  /* Badge */
  .badge { display: inline-block; font-size: 9px; padding: 1px 6px; border-radius: 20px; background: #F0EEF0; color: #bbb; }

  /* Diff badge */
  .diff-badge { font-size: 10px; padding: 1px 8px; border-radius: 20px; white-space: nowrap; }
  .diff-badge.over { background: var(--red-bg); color: var(--red-text); }
  .diff-badge.zero { background: #F4F4F4; color: #ccc; }
  .diff-badge.under { background: var(--green-bg); color: var(--green-text); }

  /* Item row */
  .item-row { padding: 9px 0; border-bottom: 0.5px solid #FAF0F5; }
  .item-row:last-child { border-bottom: none; }
  .item-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .item-name { font-size: 12px; color: var(--txt-main); display: flex; align-items: center; gap: 4px; flex: 1; }
  .del-x { font-size: 11px; color: #ddd; cursor: pointer; margin-left: 3px; }
  .del-x:hover { color: var(--red-text); }

  /* Inputs */
  .item-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .input-wrap { display: flex; flex-direction: column; gap: 2px; }
  .input-wrap label { font-size: 9px; color: #ccc; }
  .input-wrap input {
    font-size: 12px; border: 0.5px solid var(--border); border-radius: 8px;
    padding: 6px 8px; width: 100%; text-align: right;
    background: var(--bg-input); color: var(--txt-main);
    font-family: inherit; transition: border-color 0.15s;
  }
  .input-wrap input:focus { outline: none; border-color: var(--pk400); background: #fff; }
  .input-wrap input.readonly { background: var(--bg-input); }

  /* Add row */
  .add-row { display: flex; align-items: center; gap: 6px; padding: 8px 0 2px; color: #ddd; font-size: 11px; cursor: pointer; }
  .add-row:hover { color: var(--pk400); }
  .plus-c { width: 16px; height: 16px; border-radius: 50%; border: 1px dashed #ddd; display: flex; align-items: center; justify-content: center; font-size: 13px; line-height: 1; flex-shrink: 0; color: #ddd; }
  .add-row:hover .plus-c { border-color: var(--pk400); color: var(--pk400); }

  /* Total row */
  .total-row { display: flex; justify-content: space-between; align-items: center; padding: 9px 0 0; border-top: 0.5px solid var(--border); margin-top: 6px; }
  .total-row > span { font-size: 11px; font-weight: 500; color: var(--txt-main); }
  .total-nums { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; justify-content: flex-end; }
  .total-nums span { font-size: 11px; color: var(--txt-hint); }

  /* Metric cards */
  .metric-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 12px; }
  .metric { background: #fff; border-radius: 12px; padding: 10px 12px; border: 0.5px solid var(--border); }
  .metric-label { font-size: 10px; color: #ccc; margin-bottom: 4px; }
  .metric-value { font-size: 15px; font-weight: 600; color: var(--txt-main); }

  /* Progress bar */
  .pbar-wrap { margin-bottom: 10px; }
  .pbar-label { display: flex; justify-content: space-between; font-size: 10px; color: #bbb; margin-bottom: 4px; }
  .pbar { height: 5px; background: #F5ECF0; border-radius: 3px; overflow: hidden; }
  .pfill { height: 100%; border-radius: 3px; transition: width 0.4s ease; }

  /* Verify blocks */
  .verify-block { border-radius: 12px; padding: 12px 14px; margin-bottom: 10px; }
  .verify-block.warn { background: var(--warn-bg); border: 0.5px solid var(--warn-border); }
  .verify-block.ok { background: var(--green-bg); border: 0.5px solid var(--green-border); }
  .verify-title { font-size: 11px; font-weight: 500; margin-bottom: 6px; }
  .verify-block.warn .verify-title { color: var(--warn-text); }
  .verify-block.ok .verify-title { color: var(--green-text); }
  .verify-row { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 2px; }
  .verify-block.warn .verify-row { color: #C8A878; }
  .verify-block.ok .verify-row { color: #7DB891; }

  /* Installment card */
  .inst-card { background: var(--pk50); border-radius: 12px; padding: 11px 13px; margin-bottom: 8px; border: 0.5px solid var(--border); }
  .inst-top { display: flex; justify-content: space-between; margin-bottom: 6px; }
  .inst-name { font-size: 12px; font-weight: 500; color: var(--txt-main); display: flex; align-items: center; gap: 4px; }
  .inst-sub { font-size: 10px; color: #bbb; margin-top: 2px; }
  .inst-remain { font-size: 12px; font-weight: 500; color: #aaa; text-align: right; }
  .inst-cnt { font-size: 10px; color: #ccc; text-align: right; margin-top: 2px; }
  .inst-pbar { height: 4px; background: var(--pk100); border-radius: 2px; overflow: hidden; margin-top: 6px; }
  .inst-pfill { height: 100%; border-radius: 2px; background: var(--pk400); }
  .inst-pbar-label { display: flex; justify-content: space-between; font-size: 9px; color: #ccc; margin-top: 3px; }
  .inst-fields { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; margin-top: 10px; padding-top: 10px; border-top: 0.5px solid var(--border); }
  .inst-field label { font-size: 9px; color: #ccc; display: block; margin-bottom: 3px; }
  .inst-field input { font-size: 11px; border: 0.5px solid var(--border); border-radius: 6px; padding: 4px 6px; width: 100%; background: #fff; color: var(--txt-main); text-align: right; font-family: inherit; }
  .inst-field input:focus { outline: none; border-color: var(--pk400); }
  .inst-del { float: right; font-size: 11px; color: #ddd; cursor: pointer; }
  .inst-del:hover { color: var(--red-text); }

  /* AI */
  .ai-label { font-size: 10px; color: #ccc; margin-bottom: 6px; }
  .ai-box { background: var(--pk50); border-radius: 10px; padding: 12px 14px; font-size: 12px; color: var(--txt-sub); line-height: 1.7; }
  .ai-loading { color: #ccc; font-size: 12px; text-align: center; padding: 20px 0; }
  .ai-btn { display: block; width: 100%; text-align: center; font-size: 12px; color: var(--pk400); background: var(--pk50); border: 0.5px solid var(--pk100); border-radius: 10px; padding: 12px; cursor: pointer; margin-top: 4px; font-family: inherit; }
  .ai-btn:hover { background: var(--pk100); }

  /* Modal overlay */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 100; align-items: center; justify-content: center; padding: 20px; }
  .modal-overlay.open { display: flex; }
  .modal { background: #fff; border-radius: 20px; padding: 20px; width: 100%; max-width: 380px; }
  .modal-title { font-size: 14px; font-weight: 600; color: var(--txt-main); margin-bottom: 16px; }
  .modal-field { margin-bottom: 12px; }
  .modal-field label { font-size: 11px; color: var(--txt-sub); display: block; margin-bottom: 4px; }
  .modal-field input, .modal-field select {
    font-size: 13px; border: 0.5px solid var(--border); border-radius: 10px;
    padding: 9px 12px; width: 100%; background: var(--bg-input); color: var(--txt-main); font-family: inherit;
  }
  .modal-field input:focus, .modal-field select:focus { outline: none; border-color: var(--pk400); background: #fff; }
  .modal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .modal-actions { display: flex; gap: 8px; margin-top: 16px; }
  .btn-cancel { flex: 1; padding: 10px; border: 0.5px solid var(--border); border-radius: 10px; background: #fff; color: var(--txt-sub); font-size: 13px; cursor: pointer; font-family: inherit; }
  .btn-ok { flex: 1; padding: 10px; border: none; border-radius: 10px; background: var(--pk400); color: #fff; font-size: 13px; font-weight: 500; cursor: pointer; font-family: inherit; }

  /* Empty state */
  .empty { text-align: center; color: #ccc; font-size: 12px; padding: 20px 0; }
</style>
</head>
<body>
<div class="app">
  <div class="app-header">
    <div class="app-title">가계부</div>
    <div class="month-nav">
      <button class="month-btn" onclick="changeMonth(-1)">‹</button>
      <span id="month-label"></span>
      <button class="month-btn" onclick="changeMonth(1)">›</button>
    </div>
  </div>

  <div class="tab-bar">
    <button class="tab active" onclick="showTab('dashboard',this)">이번 달</button>
    <button class="tab" onclick="showTab('compare',this)">예산비교</button>
    <button class="tab" onclick="showTab('cards',this)">카드/할부</button>
    <button class="tab" onclick="showTab('ai',this)">AI 분석</button>
  </div>

  <!-- 이번 달 대시보드 -->
  <div class="screen active" id="screen-dashboard">
    <div class="card">
      <div class="metric-row">
        <div class="metric"><div class="metric-label">총 수입</div><div class="metric-value" id="dash-income">-</div></div>
        <div class="metric"><div class="metric-label">총 지출</div><div class="metric-value" style="color:var(--red-soft);" id="dash-expense">-</div></div>
        <div class="metric"><div class="metric-label">잔액</div><div class="metric-value" id="dash-balance">-</div></div>
      </div>
      <div class="pbar-wrap">
        <div class="pbar-label"><span>저축성 지출</span><span id="pbar-saving-label">-</span></div>
        <div class="pbar"><div class="pfill" id="pbar-saving" style="background:var(--pk400);width:0%;"></div></div>
      </div>
      <div class="pbar-wrap">
        <div class="pbar-label"><span>소비성 지출</span><span id="pbar-spending-label">-</span></div>
        <div class="pbar"><div class="pfill" id="pbar-spending" style="background:var(--red-soft);width:0%;"></div></div>
      </div>
    </div>

    <div class="card">
      <div class="card-hd">수입 <span class="add-span" onclick="openModal('income')">+ 항목 추가</span></div>
      <div id="income-list"></div>
      <div class="add-row" onclick="openModal('income')"><div class="plus-c">+</div> 수입 추가...</div>
    </div>
  </div>

  <!-- 예산 비교 -->
  <div class="screen" id="screen-compare">
    <div class="card">
      <div class="card-hd">저축성 지출 <span class="add-span" onclick="openModal('saving')">+ 항목 추가</span></div>
      <div id="saving-list"></div>
      <div class="add-row" onclick="openModal('saving')"><div class="plus-c">+</div> 항목 추가...</div>
      <div class="total-row">
        <span>소계</span>
        <div class="total-nums">
          <span id="saving-budget-total">예산 0</span>
          <span id="saving-actual-total">결산 0</span>
          <span id="saving-diff-total" style="font-weight:500;"></span>
        </div>
      </div>
    </div>
    <div class="card">
      <div class="card-hd">소비성 지출 <span class="add-span" onclick="openModal('spending')">+ 항목 추가</span></div>
      <div id="spending-list"></div>
      <div class="add-row" onclick="openModal('spending')"><div class="plus-c">+</div> 항목 추가...</div>
      <div class="total-row">
        <span>소계</span>
        <div class="total-nums">
          <span id="spending-budget-total">예산 0</span>
          <span id="spending-actual-total">결산 0</span>
          <span id="spending-diff-total" style="font-weight:500;"></span>
        </div>
      </div>
    </div>
  </div>

  <!-- 카드/할부 -->
  <div class="screen" id="screen-cards">
    <div id="card-verify-section"></div>
    <div class="card">
      <div class="card-hd">카드사별 청구 <span class="add-span" onclick="openModal('card')">+ 카드 추가</span></div>
      <div id="card-list"></div>
      <div class="add-row" onclick="openModal('card')"><div class="plus-c">+</div> 카드 추가...</div>
    </div>
    <div class="card">
      <div class="card-hd">진행 중인 할부 <span class="add-span" onclick="openModal('installment')">+ 할부 등록</span></div>
      <div id="installment-list"></div>
      <div class="add-row" onclick="openModal('installment')"><div class="plus-c">+</div> 할부 등록...</div>
    </div>
  </div>

  <!-- AI 분석 -->
  <div class="screen" id="screen-ai">
    <div class="card">
      <div class="ai-label">AI 가계 분석</div>
      <div id="ai-result" class="ai-box" style="color:#ccc;text-align:center;">아래 버튼을 눌러 분석을 시작해요</div>
    </div>
    <button class="ai-btn" onclick="runAI()">이번 달 분석 요청 ↗</button>
  </div>
</div>

<!-- 모달 -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-title" id="modal-title">항목 추가</div>
    <div id="modal-body"></div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">취소</button>
      <button class="btn-ok" onclick="saveModal()">저장</button>
    </div>
  </div>
</div>

<script>
// ── State ──────────────────────────────────────────────
let currentYear = new Date().getFullYear();
let currentMonth = new Date().getMonth() + 1;
let modalType = '';
let editIndex = -1;

function monthKey() { return `${currentYear}-${String(currentMonth).padStart(2,'0')}`; }

function loadData(key) {
  try { return JSON.parse(localStorage.getItem(key)) || []; } catch { return []; }
}
function saveData(key, val) { localStorage.setItem(key, JSON.stringify(val)); }

function getData(type) { return loadData(`budget_${type}_${monthKey()}`); }
function setData(type, val) { saveData(`budget_${type}_${monthKey()}`, val); }

// ── Formatting ─────────────────────────────────────────
function fmt(n) { return Number(n||0).toLocaleString('ko-KR'); }
function parseFmt(s) { return parseInt(String(s).replace(/,/g,'')) || 0; }

// ── Month nav ──────────────────────────────────────────
function changeMonth(d) {
  currentMonth += d;
  if (currentMonth > 12) { currentMonth = 1; currentYear++; }
  if (currentMonth < 1) { currentMonth = 12; currentYear--; }
  updateMonthLabel();
  renderAll();
}
function updateMonthLabel() {
  document.getElementById('month-label').textContent = `${currentYear}년 ${currentMonth}월`;
}

// ── Tabs ───────────────────────────────────────────────
function showTab(name, el) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
  el.classList.add('active');
}

// ── Render helpers ─────────────────────────────────────
function diffBadge(budget, actual) {
  const b = parseFmt(budget), a = parseFmt(actual);
  if (!a && !b) return `<span class="diff-badge zero">-</span>`;
  const d = a - b;
  if (d === 0) return `<span class="diff-badge zero">동일</span>`;
  if (d > 0) return `<span class="diff-badge over">+${fmt(d)} 초과</span>`;
  return `<span class="diff-badge under">${fmt(Math.abs(d))} 절약</span>`;
}

function renderItemList(containerId, type) {
  const items = getData(type);
  const el = document.getElementById(containerId);
  if (!items.length) { el.innerHTML = `<div class="empty">항목이 없어요</div>`; return; }
  el.innerHTML = items.map((item, i) => `
    <div class="item-row">
      <div class="item-top">
        <span class="item-name">
          ${item.card ? `<span class="badge">${item.card}</span>` : ''}
          ${item.name}
          <span class="del-x" onclick="deleteItem('${type}',${i})">✕</span>
        </span>
        ${diffBadge(item.budget, item.actual)}
      </div>
      <div class="item-inputs">
        <div class="input-wrap"><label>예산</label>
          <input class="readonly" value="${fmt(item.budget)}" onchange="updateItem('${type}',${i},'budget',this.value)" onfocus="this.classList.remove('readonly')" onblur="this.classList.add('readonly')" />
        </div>
        <div class="input-wrap"><label>결산</label>
          <input value="${fmt(item.actual)}" onchange="updateItem('${type}',${i},'actual',this.value)" />
        </div>
      </div>
    </div>`).join('');
}

function renderTotals(budgetId, actualId, diffId, type) {
  const items = getData(type);
  const b = items.reduce((s, i) => s + parseFmt(i.budget), 0);
  const a = items.reduce((s, i) => s + parseFmt(i.actual), 0);
  const d = a - b;
  document.getElementById(budgetId).textContent = `예산 ${fmt(b)}`;
  document.getElementById(actualId).textContent = `결산 ${fmt(a)}`;
  const el = document.getElementById(diffId);
  if (d === 0) { el.textContent = ''; }
  else if (d > 0) { el.textContent = `+${fmt(d)}`; el.style.color = 'var(--red-soft)'; }
  else { el.textContent = `-${fmt(Math.abs(d))}`; el.style.color = 'var(--green-text)'; }
}

function renderDashboard() {
  const incomes = getData('income');
  const savings = getData('saving');
  const spendings = getData('spending');
  const totalIncome = incomes.reduce((s,i) => s + parseFmt(i.actual || i.budget), 0);
  const totalSaving = savings.reduce((s,i) => s + parseFmt(i.actual), 0);
  const totalSpending = spendings.reduce((s,i) => s + parseFmt(i.actual), 0);
  const totalExpense = totalSaving + totalSpending;
  const balance = totalIncome - totalExpense;

  document.getElementById('dash-income').textContent = fmt(totalIncome) + '원';
  document.getElementById('dash-expense').textContent = fmt(totalExpense) + '원';
  const bal = document.getElementById('dash-balance');
  bal.textContent = fmt(Math.abs(balance)) + '원';
  bal.style.color = balance >= 0 ? 'var(--green-text)' : 'var(--red-text)';

  const savBudget = savings.reduce((s,i) => s + parseFmt(i.budget), 0);
  const spBudget = spendings.reduce((s,i) => s + parseFmt(i.budget), 0);

  const savPct = savBudget ? Math.min(100, Math.round(totalSaving / savBudget * 100)) : 0;
  const spPct = spBudget ? Math.min(100, Math.round(totalSpending / spBudget * 100)) : 0;

  document.getElementById('pbar-saving').style.width = savPct + '%';
  document.getElementById('pbar-saving-label').textContent = `${fmt(totalSaving)} / ${fmt(savBudget)}`;
  document.getElementById('pbar-spending').style.width = spPct + '%';
  document.getElementById('pbar-spending-label').textContent = `${fmt(totalSpending)} / ${fmt(spBudget)}`;

  renderItemList('income-list', 'income');
}

function renderCards() {
  const cards = getData('card');
  const spendings = getData('spending');

  // verify section
  const vEl = document.getElementById('card-verify-section');
  if (!cards.length) { vEl.innerHTML = ''; }
  else {
    vEl.innerHTML = cards.map(c => {
      const itemSum = spendings.filter(s => s.card === c.name).reduce((s,i) => s + parseFmt(i.actual), 0);
      const bill = parseFmt(c.bill);
      const diff = bill - itemSum;
      const isOk = Math.abs(diff) < 100;
      return `<div class="verify-block ${isOk ? 'ok' : 'warn'}">
        <div class="verify-title">${c.name} — ${isOk ? '일치해요' : '차이 있어요'}</div>
        <div class="verify-row"><span>항목 합계</span><span>${fmt(itemSum)}원</span></div>
        <div class="verify-row"><span>청구서 입력</span><span>${fmt(bill)}원</span></div>
        <div class="verify-row"><span style="font-weight:500;">차이</span><span style="font-weight:500;">${isOk ? '0원' : fmt(Math.abs(diff)) + '원 ' + (diff > 0 ? '미확인' : '초과입력')}</span></div>
      </div>`;
    }).join('');
  }

  // card list
  const cEl = document.getElementById('card-list');
  if (!cards.length) { cEl.innerHTML = `<div class="empty">카드가 없어요</div>`; return; }
  cEl.innerHTML = cards.map((c, i) => {
    const itemSum = spendings.filter(s => s.card === c.name).reduce((s,i) => s + parseFmt(i.actual), 0);
    const bill = parseFmt(c.bill);
    const diff = bill - itemSum;
    const isOk = Math.abs(diff) < 100;
    return `<div class="item-row">
      <div class="item-top">
        <span class="item-name">${c.name} <span class="del-x" onclick="deleteItem('card',${i})">✕</span></span>
        <span style="font-size:10px;color:${isOk ? 'var(--green-text)' : 'var(--red-text)'};">${isOk ? '일치' : fmt(Math.abs(diff)) + ' 미확인'}</span>
      </div>
      <div class="item-inputs">
        <div class="input-wrap"><label>항목 합계</label><input class="readonly" value="${fmt(itemSum)}" readonly /></div>
        <div class="input-wrap"><label>청구서 입력</label><input value="${fmt(c.bill)}" onchange="updateItem('card',${i},'bill',this.value)" /></div>
      </div>
    </div>`;
  }).join('');
}

function renderInstallments() {
  const insts = getData('installment');
  const el = document.getElementById('installment-list');
  if (!insts.length) { el.innerHTML = `<div class="empty">등록된 할부가 없어요</div>`; return; }
  el.innerHTML = insts.map((inst, i) => {
    const paid = parseFmt(inst.paid) || 0;
    const total = parseFmt(inst.total) || 1;
    const monthly = parseFmt(inst.monthly);
    const remain = (total - paid) * monthly;
    const pct = Math.round(paid / total * 100);
    return `<div class="inst-card">
      <div class="inst-top">
        <div>
          <div class="inst-name">${inst.card ? `<span class="badge">${inst.card}</span>` : ''} ${inst.name}</div>
          <div class="inst-sub">월 ${fmt(monthly)}원</div>
        </div>
        <div>
          <div class="inst-remain">잔여 ${fmt(remain)}원 <span class="inst-del" onclick="deleteItem('installment',${i})">✕</span></div>
          <div class="inst-cnt">${total - paid}회 남음</div>
        </div>
      </div>
      <div class="inst-pbar"><div class="inst-pfill" style="width:${pct}%;"></div></div>
      <div class="inst-pbar-label"><span>${paid}/${total}회 완료</span><span>${total - paid}회 남음</span></div>
      <div class="inst-fields">
        <div class="inst-field"><label>항목명</label><input value="${inst.name}" onchange="updateItem('installment',${i},'name',this.value)" /></div>
        <div class="inst-field"><label>월 금액</label><input value="${fmt(inst.monthly)}" onchange="updateItem('installment',${i},'monthly',this.value)" /></div>
        <div class="inst-field"><label>완료/전체</label><input value="${paid}/${total}" onchange="updateInstPaid(${i},this.value)" /></div>
      </div>
    </div>`;
  }).join('');
}

function renderAll() {
  renderDashboard();
  renderItemList('saving-list', 'saving');
  renderTotals('saving-budget-total','saving-actual-total','saving-diff-total','saving');
  renderItemList('spending-list', 'spending');
  renderTotals('spending-budget-total','spending-actual-total','spending-diff-total','spending');
  renderCards();
  renderInstallments();
}

// ── CRUD ───────────────────────────────────────────────
function updateItem(type, idx, field, val) {
  const items = getData(type);
  items[idx][field] = parseFmt(val);
  setData(type, items);
  renderAll();
}

function updateInstPaid(idx, val) {
  const items = getData('installment');
  const parts = val.split('/');
  if (parts.length === 2) {
    items[idx].paid = parseInt(parts[0]) || 0;
    items[idx].total = parseInt(parts[1]) || 1;
  }
  setData('installment', items);
  renderInstallments();
}

function deleteItem(type, idx) {
  const items = getData(type);
  items.splice(idx, 1);
  setData(type, items);
  renderAll();
}

// ── Modal ──────────────────────────────────────────────
const cardNames = () => getData('card').map(c => c.name);

function openModal(type) {
  modalType = type;
  editIndex = -1;
  const titles = { income:'수입 추가', saving:'저축성 지출 추가', spending:'소비성 지출 추가', card:'카드 추가', installment:'할부 등록' };
  document.getElementById('modal-title').textContent = titles[type] || '추가';

  const cards = cardNames();
  const cardSelect = cards.length
    ? `<select id="m-card"><option value="">카드 없음</option>${cards.map(c => `<option>${c}</option>`).join('')}</select>`
    : `<input id="m-card" placeholder="카드사 이름 (선택)" />`;

  let body = '';
  if (type === 'income') {
    body = `
      <div class="modal-field"><label>항목명</label><input id="m-name" placeholder="예: 급여" /></div>
      <div class="modal-grid">
        <div class="modal-field"><label>예산</label><input id="m-budget" placeholder="0" type="number" /></div>
        <div class="modal-field"><label>결산</label><input id="m-actual" placeholder="0" type="number" /></div>
      </div>`;
  } else if (type === 'saving' || type === 'spending') {
    body = `
      <div class="modal-field"><label>항목명</label><input id="m-name" placeholder="예: 적금" /></div>
      <div class="modal-field"><label>카드사 (선택)</label>${cardSelect}</div>
      <div class="modal-grid">
        <div class="modal-field"><label>예산</label><input id="m-budget" placeholder="0" type="number" /></div>
        <div class="modal-field"><label>결산</label><input id="m-actual" placeholder="0" type="number" /></div>
      </div>`;
  } else if (type === 'card') {
    body = `
      <div class="modal-field"><label>카드사 이름</label><input id="m-name" placeholder="예: 하나카드" /></div>
      <div class="modal-field"><label>청구서 총액</label><input id="m-bill" placeholder="0" type="number" /></div>`;
  } else if (type === 'installment') {
    body = `
      <div class="modal-field"><label>항목명</label><input id="m-name" placeholder="예: 의료비" /></div>
      <div class="modal-field"><label>카드사</label>${cardSelect}</div>
      <div class="modal-grid">
        <div class="modal-field"><label>월 금액</label><input id="m-monthly" placeholder="0" type="number" /></div>
        <div class="modal-field"><label>총 회차</label><input id="m-total" placeholder="예: 12" type="number" /></div>
      </div>
      <div class="modal-field"><label>완료 회차</label><input id="m-paid" placeholder="0" type="number" value="0" /></div>`;
  }
  document.getElementById('modal-body').innerHTML = body;
  document.getElementById('modal').classList.add('open');
  document.querySelector('#modal-body input')?.focus();
}

function closeModal() { document.getElementById('modal').classList.remove('open'); }

function saveModal() {
  const name = document.getElementById('m-name')?.value.trim();
  if (modalType !== 'card' && !name) return;

  if (modalType === 'income') {
    const items = getData('income');
    items.push({ name, budget: parseInt(document.getElementById('m-budget')?.value)||0, actual: parseInt(document.getElementById('m-actual')?.value)||0 });
    setData('income', items);
  } else if (modalType === 'saving' || modalType === 'spending') {
    const items = getData(modalType);
    const card = document.getElementById('m-card')?.value || '';
    items.push({ name, card, budget: parseInt(document.getElementById('m-budget')?.value)||0, actual: parseInt(document.getElementById('m-actual')?.value)||0 });
    setData(modalType, items);
  } else if (modalType === 'card') {
    const cardName = document.getElementById('m-name')?.value.trim();
    if (!cardName) return;
    const items = getData('card');
    items.push({ name: cardName, bill: parseInt(document.getElementById('m-bill')?.value)||0 });
    setData('card', items);
  } else if (modalType === 'installment') {
    const items = getData('installment');
    const card = document.getElementById('m-card')?.value || '';
    items.push({
      name, card,
      monthly: parseInt(document.getElementById('m-monthly')?.value)||0,
      total: parseInt(document.getElementById('m-total')?.value)||1,
      paid: parseInt(document.getElementById('m-paid')?.value)||0
    });
    setData('installment', items);
  }
  closeModal();
  renderAll();
}

// Enter key in modal
document.getElementById('modal').addEventListener('keydown', e => { if (e.key === 'Enter') saveModal(); });
document.getElementById('modal').addEventListener('click', e => { if (e.target === document.getElementById('modal')) closeModal(); });

// ── AI ─────────────────────────────────────────────────
async function runAI() {
  const savings = getData('saving');
  const spendings = getData('spending');
  const incomes = getData('income');
  const cards = getData('card');
  const insts = getData('installment');

  const totalIncome = incomes.reduce((s,i) => s + parseFmt(i.actual||i.budget), 0);
  const totalSaving = savings.reduce((s,i) => s + parseFmt(i.actual), 0);
  const totalSpending = spendings.reduce((s,i) => s + parseFmt(i.actual), 0);
  const savBudget = savings.reduce((s,i) => s + parseFmt(i.budget), 0);
  const spBudget = spendings.reduce((s,i) => s + parseFmt(i.budget), 0);

  const overSavings = savings.filter(i => parseFmt(i.actual) > parseFmt(i.budget));
  const overSpendings = spendings.filter(i => parseFmt(i.actual) > parseFmt(i.budget));
  const instInfo = insts.map(i => `${i.name} 월${fmt(i.monthly)}원 ${i.total - (i.paid||0)}회 남음`).join(', ');

  const prompt = `당신은 친절한 가계부 분석가예요. 아래 ${currentYear}년 ${currentMonth}월 가계 데이터를 보고 한국어로 분석해주세요.

[수입] 총 ${fmt(totalIncome)}원
[저축성지출] 예산 ${fmt(savBudget)}원 / 결산 ${fmt(totalSaving)}원${overSavings.length ? ` (초과: ${overSavings.map(i=>i.name).join(', ')})` : ''}
[소비성지출] 예산 ${fmt(spBudget)}원 / 결산 ${fmt(totalSpending)}원${overSpendings.length ? ` (초과: ${overSpendings.map(i=>i.name).join(', ')})` : ''}
[할부] ${instInfo || '없음'}
[카드] ${cards.map(c => c.name + ' 청구 ' + fmt(c.bill) + '원').join(', ') || '없음'}

다음 3가지를 자연스럽게 한 단락씩 작성해주세요:
1. 이번 달 전반적인 가계 요약 (숫자 포함)
2. 눈여겨볼 패턴이나 주의할 점
3. 다음 달을 위한 구체적인 제안

친근하고 따뜻한 말투로, 300자 내외로 작성해주세요.`;

  const el = document.getElementById('ai-result');
  el.textContent = '분석 중이에요...';
  el.style.color = '#ccc';

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{ role: 'user', content: prompt }]
      })
    });
    const data = await res.json();
    const text = data.content?.map(c => c.text || '').join('') || '분석 결과를 가져오지 못했어요.';
    el.textContent = text;
    el.style.color = 'var(--txt-sub)';
  } catch {
    el.textContent = '분석 중 오류가 발생했어요. 잠시 후 다시 시도해주세요.';
    el.style.color = 'var(--red-text)';
  }
}

// ── Init ───────────────────────────────────────────────
updateMonthLabel();
renderAll();
</script>
